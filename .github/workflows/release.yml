name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src

      - name: Build
        run: dotnet build src --configuration Release --no-restore

      - name: Test
        run: dotnet test src --configuration Release --no-build

      - name: Publish
        run: |
          dotnet publish src/CharzPiexApi.csproj \
            --configuration Release \
            --output publish
          rm -f publish/appsettings*.json

      - name: Generate version
        id: version
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create manifest
        run: |
          cat <<EOF > manifest.json
          {
            "version": "${{ steps.version.outputs.version }}",
            "published": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
            
      - name: Create ZIP
        run: |
          cd publish
          zip -r ../CharzApi-${{ steps.version.outputs.version }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CharzApi v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: CharzApi-${{ steps.version.outputs.version }}.zip